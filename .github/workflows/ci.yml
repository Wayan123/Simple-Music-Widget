name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build and publish smoke test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        shell: pwsh
        run: dotnet restore MusicWidget.csproj

      - name: Build
        shell: pwsh
        run: dotnet build MusicWidget.csproj -c Release --no-restore -v:minimal

      - name: Publish smoke test
        shell: pwsh
        run: ./scripts/build-installer.ps1 -SkipInstaller
