name: Bug report
description: Report a reproducible problem in Music Widget
title: "Bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a bug. Please include enough detail to reproduce it.
  - type: input
    id: version
    attributes:
      label: Music Widget version
      placeholder: v1.3.1
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: Windows 11 23H2
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Music Widget
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Screenshots or logs
      description: Attach screenshots, Event Viewer errors, or terminal output if available.
